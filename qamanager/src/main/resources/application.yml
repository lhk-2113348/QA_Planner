spring:
  application:
    name: qamanager

  datasource:
    url: jdbc:postgresql://localhost:5432/qamanagerdb
    username: postgres
    password: 1004
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect